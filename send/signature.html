  修改签名只需改这个文件，不需动任何邮件模板。

  可用变量:
    {{name}}        - 发件人姓名
    {{email}}       - 发件人邮箱
    {{phone}}       - 手机号
    {{website}}     - 官网
    {{imageUrl}}    - 签名图 URL（config.json 中配置）

  如果签名图放在 send/signature.png，脚本自动内嵌：
    <img src="cid:signature" ...>
-->
