<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日报告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text2: #86868b;
    --text3: #aeaeb2;
    --sep: #e5e5ea;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #636366;
      --sep: #2c2c2e;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 48px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .report { width: 640px; max-width: 100%; }

  /* Header */
  .report-header {
    text-align: center;
    padding: 0 0 40px;
  }
  .report-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .report-subtitle {
    font-size: 15px;
    color: var(--text2);
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* Section */
  .section { margin-bottom: 28px; }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  /* Metric Cards — 横排 */
  .metric-row {
    display: flex;
    gap: 10px;
  }
  .metric-card {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 18px 16px;
    box-shadow: var(--shadow);
  }
  .metric-card .val {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .metric-card .lbl {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
    letter-spacing: -0.01em;
  }

  /* Pipeline Bar */
  .pipe-row {
    display: flex;
    gap: 6px;
    background: var(--card);
    border-radius: 14px;
    padding: 12px;
    box-shadow: var(--shadow);
  }
  .pipe-item {
    flex: 1;
    text-align: center;
    padding: 12px 4px;
    border-radius: 10px;
    background: var(--bg);
  }
  .pipe-item .n { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
  .pipe-item .t { font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: -0.01em; }

  /* Followup */
  .followup-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .followup-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--card);
    border-radius: 12px;
    box-shadow: var(--shadow);
  }
  .fu-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .fu-dot.overdue { background: #ff3b30; }
  .fu-dot.today { background: #ff9f0a; }
  .fu-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .fu-co { font-size: 13px; color: var(--text2); margin-left: auto; }

  /* Footer */
  .report-footer {
    margin-top: 40px;
    padding-top: 14px;
    border-top: 1px solid var(--sep);
    font-size: 11px;
    color: var(--text3);
    display: flex;
    justify-content: space-between;
    letter-spacing: -0.01em;
  }

  @media print {
    body { background: #fff; padding: 0; }
    .metric-card, .pipe-row, .followup-item { box-shadow: none; border: 1px solid #e5e5ea; }
  }
</style>
</head>
<body>
<div class="report">

  <div class="report-header">
    <div class="report-title">今日报告</div>
    <div class="report-subtitle">2026年7月19日 &middot; 星期六</div>
  </div>

  <div class="section">
    <div class="section-label">发送</div>
    <div class="metric-row">
      <div class="metric-card"><div class="val">12</div><div class="lbl">已发送</div></div>
      <div class="metric-card"><div class="val">11</div><div class="lbl">成功</div></div>
      <div class="metric-card"><div class="val">1</div><div class="lbl">失败</div></div>
      <div class="metric-card"><div class="val">91.7%</div><div class="lbl">成功率</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">收件</div>
    <div class="metric-row">
      <div class="metric-card"><div class="val">8</div><div class="lbl">新邮件</div></div>
      <div class="metric-card"><div class="val">3</div><div class="lbl">回复</div></div>
      <div class="metric-card"><div class="val">1</div><div class="lbl">自动回复</div></div>
      <div class="metric-card"><div class="val">2</div><div class="lbl">退信</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">管线</div>
    <div class="pipe-row">
      <div class="pipe-item"><div class="n">9</div><div class="t">触达中</div></div>
      <div class="pipe-item"><div class="n">2</div><div class="t">报价中</div></div>
      <div class="pipe-item"><div class="n">1</div><div class="t">试单</div></div>
      <div class="pipe-item"><div class="n">5</div><div class="t">合作中</div></div>
      <div class="pipe-item"><div class="n">1</div><div class="t">已流失</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">今日待跟进</div>
    <div class="followup-list">
      <div class="followup-item">
        <span class="fu-dot overdue"></span>
        <span class="fu-name">Carla Nunes</span>
        <span class="fu-co">Trimanshipping</span>
      </div>
      <div class="followup-item">
        <span class="fu-dot today"></span>
        <span class="fu-name">Felipe Veiga</span>
        <span class="fu-co">Atlantic Cargo</span>
      </div>
      <div class="followup-item">
        <span class="fu-dot today"></span>
        <span class="fu-name">Fabio Ferraro</span>
        <span class="fu-co">Grupo Basser</span>
      </div>
    </div>
  </div>

  <div class="report-footer">
    <span>Prospector 2.10.9</span>
    <span>生成 2026-07-19 18:00</span>
  </div>

</div>
</body>
</html>
